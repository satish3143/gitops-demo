name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Build
      run: mvn clean package

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gitops-demo:${{ github.run_number }} .

    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/gitops-demo:${{ github.run_number }}